<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tarjeta de Lealtad</title>

<style>
/* (TODO tu CSS original se mantiene igual, NO se toca) */
</style>
</head>

<body>

<section id="appView">

  <!-- HERO -->
  <div class="card hero">
    <p class="eyebrow">Tu tarjeta</p>
    <h1 id="saludoNombre">Hola, cliente</h1>
    <p id="heroText">Acumula 10 puntos y gana un café gratis.</p>
  </div>

  <!-- PROGRESO -->
  <div class="card progress-wrap">
    <div class="progress-head">
      <div>
        <h2>Tu progreso</h2>
        <p class="muted" id="faltanText">Te faltan 10 puntos para tu premio.</p>
      </div>
      <div class="big-points">
        <strong id="pointsCount">0</strong> / <span id="goalCount">10</span>
      </div>
    </div>

    <div class="cups" id="cupsGrid"></div>
  </div>

  <!-- QR -->
  <div class="card qr-card">
    <p class="eyebrow">Tu QR personal</p>
    <div class="qr-box">
      <img id="qrImage" />
    </div>
    <strong>Muéstralo al finalizar tu compra</strong>
    <p class="muted">
      El encargado lo escanea y valida tu punto.
    </p>
  </div>

</section>

<script>
function renderCliente(c) {
  if (!c) return;

  const premioDisponible = String(c.premio_disponible || 'NO').toUpperCase() === 'SI';
  const faltan = Math.max(0, 10 - Number(c.puntos || 0));

  document.getElementById('saludoNombre').textContent =
    `Hola, ${c.nombre || 'cliente'}`;

  document.getElementById('pointsCount').textContent =
    Number(c.puntos || 0);

  document.getElementById('goalCount').textContent = 10;

  document.getElementById('heroText').textContent = premioDisponible
    ? `¡Ya tienes tu café gratis disponible!`
    : `Acumula 10 puntos y gana un café gratis.`;

  document.getElementById('faltanText').textContent = premioDisponible
    ? 'Ya puedes pedir tu recompensa en caja.'
    : `Te faltan ${faltan} puntos para tu premio.`;

  document.getElementById('qrImage').src =
    `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${c.id_cliente}`;

  renderCups(Number(c.puntos || 0), 10);
}

function renderCups(points, goal) {
  const grid = document.getElementById('cupsGrid');
  grid.innerHTML = '';

  for (let i = 1; i <= goal; i++) {
    const cup = document.createElement('div');
    cup.className = 'cup ' + (i <= points ? 'filled' : '');
    cup.textContent = '☕';
    grid.appendChild(cup);
  }
}
</script>

</body>
</html>
